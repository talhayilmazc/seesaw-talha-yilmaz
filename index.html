<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seesaw Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Seesaw Simulation</h1>

  <!-- Ağırlık bilgisi -->
  <div id="info">
    <span id="left-weight">Left: 0 kg</span>
    <span id="right-weight">Right: 0 kg</span>
  </div>

  <!-- Tahterevalli alanı -->
  <div id="scene">

    <!-- Pivot (üçgen ayak) -->
    <div id="pivot"></div>

    <!-- Tahta - buraya tıklanacak -->
    <div id="plank">
      <!-- Nesneler buraya JS ile eklenecek -->
    </div>

  </div>

  <!-- Reset butonu -->
  <button id="reset-btn">Reset</button>

  <script src="app.js"></script>
</body>
</html>
