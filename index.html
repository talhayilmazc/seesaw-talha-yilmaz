<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seesaw Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Page title-->
    <h1>Seesaw Simulation</h1>

    <!-- Weight info for left and right sides -->
    <div id="info">
        <span id="left-info">Left: 0 kg</span>
        <span id="right-info">Right: 0 kg</span>
    </div>

    <!-- Main seesaw scene -->
    <div id="scene">
        <div id="pivot"></div>   <!-- Triangle -->
        <div id="plank"></div>   <!-- Clickable plang "objects are added here"-->
    </div>

    <!-- Control buttons -->
    <div id="controls">
        <button id="reset-btn">Reset</button>
        <button id="pause-btn">Pause</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
